<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苹果游戏排行榜 - 准确前100 + 可选补充</title>
    <style>
        :root {
            --bg: #f5f5f7; --card-bg: #fff; --text: #1d1d1f;
            --text-secondary: #86868b; --accent: #0071e3; --border: #d2d2d7;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem;
        }
        .container { max-width: 860px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 2rem; }
        header h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 0.3rem; }
        .subtitle { font-size: 0.95rem; color: var(--text-secondary); }
        .controls {
            display: flex; justify-content: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem;
            align-items: center;
        }
        .control-group {
            display: flex; align-items: center; background: var(--card-bg);
            border-radius: 12px; padding: 0.5rem 1rem; box-shadow: var(--shadow);
        }
        .control-group label { font-weight: 600; margin-right: 0.5rem; color: var(--text-secondary); }
        select { border: 1px solid var(--border); border-radius: 8px; padding: 0.4rem 0.8rem; font-size: 1rem; }
        .check-box {
            display: flex; align-items: center; background: var(--card-bg);
            border-radius: 12px; padding: 0.5rem 1.2rem; box-shadow: var(--shadow);
            gap: 0.4rem; font-weight: 500; cursor: pointer;
        }
        .check-box input { width: 18px; height: 18px; cursor: pointer; }
        .status { text-align: center; padding: 1.5rem; color: var(--text-secondary); }
        .rank-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .rank-item {
            display: flex; align-items: center; gap: 1rem; background: var(--card-bg);
            border-radius: 16px; padding: 0.8rem 1.2rem; box-shadow: var(--shadow);
            text-decoration: none; color: inherit; transition: transform 0.15s, box-shadow 0.15s;
        }
        .rank-item:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
        .rank-number { font-size: 1.5rem; font-weight: 700; min-width: 2.2rem; text-align: center; }
        .rank-number.top3 { color: var(--accent); }
        .app-icon { width: 64px; height: 64px; border-radius: 16px; background: #f0f0f0; }
        .app-info { flex: 1; min-width: 0; }
        .app-name { font-weight: 600; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-developer { font-size: 0.9rem; color: var(--text-secondary); }
        .app-price { font-weight: 600; font-size: 1rem; color: var(--accent); min-width: 4rem; text-align: right; }
        .app-price.free { color: #34c759; }
        .edit-list { text-align: center; margin-top: 1rem; }
        .edit-list button { margin: 0 0.5rem; padding: 0.4rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: white; cursor: pointer; }
        .anime-list-box { display: none; background: white; border-radius: 12px; padding: 1rem; margin-top: 1rem; box-shadow: var(--shadow); text-align: left; max-height: 200px; overflow-y: auto; }
        .anime-list-box textarea { width: 100%; height: 150px; font-family: monospace; font-size: 0.9rem; }
        .warning { color: #ff9500; font-weight: 500; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🎮 苹果游戏排行榜</h1>
        <div class="subtitle">前100为官方准确排名，可手动开启品类补充（排名不准）</div>
    </header>

    <div class="controls">
        <div class="control-group">
            <label>🌍 地区</label>
            <select id="countrySelect">
                <option value="cn" selected>中国</option>
                <option value="us">美国</option>
                <option value="jp">日本</option>
                <option value="kr">韩国</option>
            </select>
        </div>
        <div class="control-group">
            <label>📊 榜单</label>
            <select id="chartSelect">
                <option value="topgrossing">畅销榜 (收入)</option>
                <option value="toppaid">付费下载榜</option>
            </select>
        </div>
        <label class="check-box">
            <input type="checkbox" id="animeFilter">
            <span>只显示二次元游戏（名称含关键词）</span>
        </label>
        <label class="check-box">
            <input type="checkbox" id="extendCheck">
            <span>包含子品类补充 <span class="warning">(100名后不准)</span></span>
        </label>
    </div>

    <div id="status" class="status">⏳ 正在拉取总榜前100...</div>
    <div id="rankContainer" class="rank-list"></div>

    <div class="edit-list">
        <button id="editListBtn">📝 编辑二次元关键词</button>
    </div>
    <div id="animeListEditor" class="anime-list-box">
        <textarea id="animeListText"></textarea>
        <button id="saveListBtn">💾 保存并应用</button>
        <button id="closeListBtn">关闭</button>
    </div>
</div>

    // 从本地存储读取关键词
    function getKeywordList() {
        const stored = localStorage.getItem('anime_keywords');
        if (stored) { try { return JSON.parse(stored); } catch(e){} }
        return [...DEFAULT_KEYWORDS];
    }

    function saveKeywordList(list) {
        localStorage.setItem('anime_keywords', JSON.stringify(list));
    }

    const countrySelect = document.getElementById('countrySelect');
    const chartSelect = document.getElementById('chartSelect');
    const animeCheckbox = document.getElementById('animeFilter');
    const extendCheck = document.getElementById('extendCheck');
    const statusDiv = document.getElementById('status');
    const rankContainer = document.getElementById('rankContainer');
    const editListBtn = document.getElementById('editListBtn');
    const animeListEditor = document.getElementById('animeListEditor');
    const animeListText = document.getElementById('animeListText');
    const saveListBtn = document.getElementById('saveListBtn');
    const closeListBtn = document.getElementById('closeListBtn');

    let allEntries = [];
    let top100Entries = [];
    let currentKeywords = getKeywordList();

    function buildURL(country, chartType, genre, limit = 100) {
        const path = chartType === 'topgrossing' ? 'topgrossingapplications' : 'toppaidapplications';
        return `https://itunes.apple.com/${country}/rss/${path}/limit=${limit}/genre=${genre}/json`;
    }

    async function fetchGenre(url) {
        try {
            const resp = await fetch(url);
            if (!resp.ok) return [];
            const data = await resp.json();
            return data.feed?.entry || [];
        } catch { return []; }
    }

    function getAppId(entry) { return entry['id']?.attributes?.['im:id'] || ''; }
    function getAppName(entry) { return entry['im:name']?.label || ''; }

    function extractAppInfo(entry) {
        const name = getAppName(entry);
        const developer = entry['im:artist']?.label || '';
        const appId = getAppId(entry);
        const images = entry['im:image'];
        const icon = images?.length >= 3 ? images[2].label : (images?.[0]?.label || '');
        const priceLabel = entry['im:price']?.label || '';
        const priceAmount = entry['im:price']?.attributes?.amount || '0';
        let displayPrice = priceLabel;
        if (priceAmount === '0.00' || priceLabel === '获取') displayPrice = '免费';
        return { name, developer, appId, icon, displayPrice };
    }

    // 包含匹配（忽略大小写）
    function isAnimeGameByName(name) {
        const lowerName = name.toLowerCase();
        return currentKeywords.some(kw => lowerName.includes(kw.toLowerCase()));
    }

    function renderList(entries, extended = false) {
        rankContainer.innerHTML = '';
        if (entries.length === 0) {
            rankContainer.innerHTML = '<div class="status">😴 没有符合条件的结果</div>';
            return;
        }
        entries.forEach((entry, index) => {
            const info = extractAppInfo(entry);
            const rank = index + 1;
            let rankClass = 'rank-number';
            if (rank <= 3) rankClass += ' top3';
            if (extended && rank > 100) rankClass += ' warning';

            const card = document.createElement('a');
            card.className = 'rank-item';
            card.href = info.appId ? `https://apps.apple.com/cn/app/id${info.appId}` : '#';
            card.target = '_blank';
            card.innerHTML = `
                <div class="${rankClass}">${rank}</div>
                <img class="app-icon" src="${info.icon}" alt="" loading="lazy" 
                     onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2264%22 height=%2264%22><rect fill=%22%23e0e0e0%22 width=%2264%22 height=%2264%22 rx=%2216%22/></svg>'">
                <div class="app-info">
                    <div class="app-name">${escapeHtml(info.name)}</div>
                    <div class="app-developer">${escapeHtml(info.developer)}</div>
                </div>
                <div class="app-price ${info.displayPrice === '免费' ? 'free' : ''}">${escapeHtml(info.displayPrice)}</div>
            `;
            rankContainer.appendChild(card);
        });
    }

    function applyFilterAndRender() {
        let display = allEntries;
        if (animeCheckbox.checked) {
            display = allEntries.filter(entry => isAnimeGameByName(getAppName(entry)));
        }
        const isExtended = extendCheck.checked && allEntries.length > 100;
        let msg = `✅ 共 ${display.length} 款游戏`;
        if (isExtended && display.length > 100) {
            msg += ' | 100名后排名仅供参考';
        }
        statusDiv.textContent = msg;
        renderList(display, isExtended);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function loadAllData() {
        const country = countrySelect.value;
        const chart = chartSelect.value;
        const extend = extendCheck.checked;

        statusDiv.textContent = '⏳ 正在拉取总榜前100...';
        rankContainer.innerHTML = '';

        const totalUrl = buildURL(country, chart, TOTAL_GENRE, 100);
        top100Entries = await fetchGenre(totalUrl);

        if (!extend) {
            allEntries = top100Entries;
            statusDiv.textContent = '';
            applyFilterAndRender();
            return;
        }

        statusDiv.textContent = '⏳ 正在拉取子品类补充数据...';
        const top100Ids = new Set(top100Entries.map(getAppId).filter(Boolean));
        const subRequests = SUB_GENRES.map(genre => fetchGenre(buildURL(country, chart, genre, 100)));
        const subResults = await Promise.all(subRequests);

        const merged = [...top100Entries];
        const seenIds = new Set(top100Ids);
        for (const subEntries of subResults) {
            for (const entry of subEntries) {
                const id = getAppId(entry);
                if (!id || seenIds.has(id)) continue;
                seenIds.add(id);
                merged.push(entry);
            }
        }
        allEntries = merged;
        statusDiv.textContent = '';
        applyFilterAndRender();
    }

    // 关键词编辑器
    function openEditor() {
        animeListText.value = currentKeywords.join('\n');
        animeListEditor.style.display = 'block';
    }
    function closeEditor() { animeListEditor.style.display = 'none'; }
    function saveEditor() {
        const lines = animeListText.value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        currentKeywords = lines;
        saveKeywordList(currentKeywords);
        closeEditor();
        applyFilterAndRender();
    }

    editListBtn.addEventListener('click', openEditor);
    saveListBtn.addEventListener('click', saveEditor);
    closeListBtn.addEventListener('click', closeEditor);

    countrySelect.addEventListener('change', loadAllData);
    chartSelect.addEventListener('change', loadAllData);
